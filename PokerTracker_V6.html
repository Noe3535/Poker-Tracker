
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Poker Tracker V6</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{background:#16a34a;padding:16px;text-align:center;font-size:28px;font-weight:bold}
nav{display:flex;background:#111827}
nav button{flex:1;padding:12px;border:0;background:#334155;color:white}
nav button.active{background:#22c55e}
.tab{display:none;padding:15px}.tab.active{display:block}
.card{background:#1e293b;padding:12px;border-radius:12px;margin:10px 0}
input,select,textarea{width:100%;padding:10px;margin:4px 0;box-sizing:border-box;background:#0f172a;color:white;border:1px solid #475569;border-radius:8px}
.btn{width:100%;padding:10px;margin-top:6px;border:0;border-radius:8px;background:#22c55e;color:white}
.del{background:#dc2626}
.win{color:#22c55e;font-weight:bold}
.lose{color:#ef4444;font-weight:bold}
details{margin-top:8px}
</style>
</head>
<body>
<header>🎲 Poker Tracker V6</header>

<nav>
<button class="active" onclick="showTab(0)">Neue Nacht</button>
<button onclick="showTab(1)">Statistik</button>
<button onclick="showTab(2)">Verlauf</button>
<button onclick="showTab(3)">Spieler</button>
</nav>

<div class="tab active">
<div class="card">
<input id="ort" placeholder="📍 Ort">
<textarea id="bem" placeholder="📝 Bemerkungen"></textarea>
<div id="players"></div>
<button class="btn" onclick="addPlayer()">➕ Spieler</button>
<button class="btn" onclick="calculate()">💸 Berechnen</button>
<button class="btn" onclick="saveNight()">✅ Nacht abschliessen</button>
<div id="result"></div>
</div>
</div>

<div class="tab"><div id="stats"></div></div>
<div class="tab"><div id="history"></div></div>

<div class="tab">
<div class="card">
<input id="newName" placeholder="Spielername">
<button class="btn" onclick="addName()">Speichern</button>
<div id="playerList"></div>
</div>
</div>

<script>
let names=JSON.parse(localStorage.getItem("pt6_names")||"[]");
let nights=JSON.parse(localStorage.getItem("pt6_nights")||"[]");

function save(){localStorage.setItem("pt6_names",JSON.stringify(names));localStorage.setItem("pt6_nights",JSON.stringify(nights));}

function showTab(i){
document.querySelectorAll(".tab").forEach((t,n)=>t.classList.toggle("active",n===i));
document.querySelectorAll("nav button").forEach((b,n)=>b.classList.toggle("active",n===i));
render();
}

function addName(){
let n=document.getElementById("newName").value.trim();
if(n&&!names.includes(n)){names.push(n);save();}
document.getElementById("newName").value="";
render();
}

function addPlayer(){
document.getElementById("players").insertAdjacentHTML("beforeend",
`<div class="card player">
<select class="name"><option value="">Spieler wählen</option>${names.map(n=>`<option>${n}</option>`).join("")}</select>
<input class="buyin" type="number" placeholder="Einsatz CHF">
<input class="end" type="number" placeholder="Endbetrag CHF">
<button class="btn del" onclick="this.parentElement.remove()">🗑 Löschen</button>
</div>`);
}

function getPlayers(){
let p=[];
document.querySelectorAll(".player").forEach(r=>{
let diff=(+r.querySelector(".end").value||0)-(+r.querySelector(".buyin").value||0);
p.push({
name:r.querySelector(".name").value,
buyin:+r.querySelector(".buyin").value||0,
end:+r.querySelector(".end").value||0,
diff:diff
});
});
return p;
}

function calcTransfers(players){
let winners=[],losers=[],tx=[];
players.forEach(p=>{
if(p.diff>0) winners.push({name:p.name,a:p.diff});
if(p.diff<0) losers.push({name:p.name,a:-p.diff});
});
losers.forEach(l=>{
winners.forEach(w=>{
if(l.a>0&&w.a>0){
let pay=Math.min(l.a,w.a);
tx.push(`${l.name} → ${w.name}: ${pay.toFixed(2)} CHF`);
l.a-=pay;w.a-=pay;
}
});
});
return tx;
}

function calculate(){
let p=getPlayers();
let html="<h3>Ergebnis</h3>";
p.forEach(x=>html+=`<div class="${x.diff>=0?'win':'lose'}">${x.name}: ${x.diff>=0?'+':''}${x.diff.toFixed(2)} CHF</div>`);
html+="<h3>💸 Twint</h3>"+calcTransfers(JSON.parse(JSON.stringify(p))).join("<br>");
document.getElementById("result").innerHTML=html;
}

function saveNight(){
let p=getPlayers();
if(!p.length)return;

let winner=[...p].sort((a,b)=>b.diff-a.diff)[0];
let transfers=calcTransfers(JSON.parse(JSON.stringify(p)));

nights.push({
date:new Date().toLocaleDateString("de-CH"),
ort:document.getElementById("ort").value,
bem:document.getElementById("bem").value,
winner:winner.name,
players:p,
transfers:transfers
});

save();

document.getElementById("ort").value="";
document.getElementById("bem").value="";
document.getElementById("players").innerHTML="";
document.getElementById("result").innerHTML="<div class='win'>✅ Gespeichert</div>";

render();
}

function delName(i){names.splice(i,1);save();render();}
function delNight(i){nights.splice(i,1);save();render();}

function render(){
document.getElementById("playerList").innerHTML=names.map((n,i)=>
`<div class="card">${n}<button class="btn del" onclick="delName(${i})">Löschen</button></div>`).join("");

let stat={};
nights.forEach(n=>n.players.forEach(p=>{
if(!stat[p.name]) stat[p.name]={sum:0,games:0};
stat[p.name].sum+=p.diff;
stat[p.name].games++;
}));

document.getElementById("stats").innerHTML=Object.entries(stat)
.sort((a,b)=>b[1].sum-a[1].sum)
.map(([n,s],i)=>`
<div class="card">
<b>${i==0?'🥇':i==1?'🥈':i==2?'🥉':'🎲'} ${n}</b><br>
<span class="${s.sum>=0?'win':'lose'}">${s.sum.toFixed(2)} CHF</span><br>
${s.games} Nächte
</div>`).join("");

document.getElementById("history").innerHTML=[...nights].reverse().map((n,idx)=>`
<div class="card">
<b>🃏 ${n.date}</b><br>
📍 ${n.ort||'-'}<br>
🏆 ${n.winner}<br>
👥 ${n.players.length} Spieler

<details>
<summary>Details anzeigen</summary>
${n.players.map(p=>`<div class="${p.diff>=0?'win':'lose'}">${p.name}: ${p.diff>=0?'+':''}${p.diff.toFixed(2)} CHF</div>`).join("")}

<h4>💸 Twint</h4>
${n.transfers.join("<br>")||"Keine Zahlungen"}

${n.bem?`<h4>📝 Bemerkung</h4>${n.bem}`:""}
</details>

<button class="btn del" onclick="delNight(${nights.length-1-idx})">🗑 Löschen</button>
</div>`).join("");
}

render();
</script>
</body>
</html>
