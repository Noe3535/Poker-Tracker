<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Poker Nights</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial}
header{background:linear-gradient(90deg,#166534,#22c55e);padding:16px;text-align:center;font-size:28px;font-weight:bold}
.ticker{background:#111827;overflow:hidden;white-space:nowrap;padding:8px 0}
.ticker span{display:inline-block;padding-left:100%;animation:move 25s linear infinite}
@keyframes move{from{transform:translateX(0)}to{transform:translateX(-100%)}}
nav{display:flex;background:#111827}
nav button{flex:1;padding:12px;border:0;background:#334155;color:white}
nav button.active{background:#22c55e}
.tab{display:none;padding:15px}.tab.active{display:block}
.card{background:#1e293b;padding:12px;border-radius:12px;margin:10px 0}
input,select,textarea{width:100%;padding:10px;margin:4px 0;box-sizing:border-box;background:#0f172a;color:white;border:1px solid #475569;border-radius:8px}
.btn{width:100%;padding:10px;margin-top:6px;border:0;border-radius:8px;background:#22c55e;color:white}
.del{background:#dc2626}
.win{color:#22c55e}.lose{color:#ef4444}
details{margin-top:8px}
</style>
</head>
<body>
<header>🎲 Poker Nights</header>
<div class="ticker"><span id="ticker">🎲 Poker Nights bereit</span></div>

<nav>
<button class="active" onclick="showTab(0)">Neue Nacht</button>
<button onclick="showTab(1)">Statistik</button>
<button onclick="showTab(2)">Verlauf</button>
<button onclick="showTab(3)">Spieler</button>
</nav>

<div class="tab active">
<div class="card">
<input id="ort" placeholder="📍 Ort">
<textarea id="bem" placeholder="📝 Bemerkungen"></textarea>
<div id="players"></div>
<button class="btn" onclick="addPlayer()">➕ Spieler</button>
<button class="btn" onclick="calculate()">💸 Berechnen</button>
<button class="btn" onclick="saveNight()">✅ Nacht abschliessen</button>
<div id="result"></div>
</div>
</div>

<div class="tab"><div id="stats"></div></div>
<div class="tab"><div id="history"></div></div>
<div class="tab"><div class="card"><input id="newName" placeholder="Spielername"><button class="btn" onclick="addName()">Speichern</button><div id="playerList"></div></div></div>

<script>
let names=JSON.parse(localStorage.getItem("pn_names")||"[]");
let nights=JSON.parse(localStorage.getItem("pn_nights")||"[]");

function save(){localStorage.setItem("pn_names",JSON.stringify(names));localStorage.setItem("pn_nights",JSON.stringify(nights));}
function showTab(i){document.querySelectorAll(".tab").forEach((t,n)=>t.classList.toggle("active",n===i));document.querySelectorAll("nav button").forEach((b,n)=>b.classList.toggle("active",n===i));render();}
function addName(){let n=newName.value.trim();if(n&&!names.includes(n)){names.push(n);save()}newName.value="";render();}
function addPlayer(){players.insertAdjacentHTML("beforeend",`<div class="card player"><select class="name"><option></option>${names.map(n=>`<option>${n}</option>`).join("")}</select><input class="buyin" type="number" placeholder="Einsatz"><input class="end" type="number" placeholder="Endbetrag"><button class="btn del" onclick="this.parentElement.remove()">🗑 Löschen</button></div>`);}
function getPlayers(){let p=[];document.querySelectorAll(".player").forEach(r=>{let b=+r.querySelector(".buyin").value||0,e=+r.querySelector(".end").value||0;p.push({name:r.querySelector(".name").value,buyin:b,end:e,diff:e-b});});return p;}
function transfers(ps){let w=[],l=[],t=[];ps.forEach(p=>{if(p.diff>0)w.push({n:p.name,a:p.diff});if(p.diff<0)l.push({n:p.name,a:-p.diff});});l.forEach(x=>w.forEach(y=>{if(x.a>0&&y.a>0){let p=Math.min(x.a,y.a);t.push(`${x.n} → ${y.n}: ${p.toFixed(2)} CHF`);x.a-=p;y.a-=p;}}));return t;}
function calculate(){let p=getPlayers();let h="<h3>Ergebnis</h3>";p.forEach(x=>h+=`<div class="${x.diff>=0?'win':'lose'}">${x.name}: ${(x.diff>=0?'+':'')+x.diff.toFixed(2)} CHF</div>`);h+="<h3>💸 Twint</h3>"+transfers(JSON.parse(JSON.stringify(p))).join("<br>");result.innerHTML=h;}
function saveNight(){let p=getPlayers();if(!p.length)return;let tr=transfers(JSON.parse(JSON.stringify(p)));let winner=[...p].sort((a,b)=>b.diff-a.diff)[0];nights.push({date:new Date().toLocaleDateString('de-CH'),ort:ort.value,bem:bem.value,winner:winner.name,players:p,transfers:tr});save();ort.value="";bem.value="";players.innerHTML="";result.innerHTML="✅ Gespeichert";render();}
function delName(i){names.splice(i,1);save();render();}
function delNight(i){nights.splice(i,1);save();render();}
function updateTicker(){let all=nights.flatMap(n=>n.players);if(!all.length){ticker.textContent="🎲 Poker Nights • Erfasse deine erste Pokernacht";return;}let bw=all.reduce((a,b)=>a.diff>b.diff?a:b);let bl=all.reduce((a,b)=>a.diff<b.diff?a:b);let sums={};all.forEach(p=>sums[p.name]=(sums[p.name]||0)+p.diff);let lead=Object.entries(sums).sort((a,b)=>b[1]-a[1])[0];let lose=Object.entries(sums).sort((a,b)=>a[1]-b[1])[0];ticker.textContent=`🏆 Biggest Winner Ever: ${bw.name} (+${bw.diff.toFixed(2)} CHF) • 😭 Biggest Loser Ever: ${bl.name} (${bl.diff.toFixed(2)} CHF) • 👑 Gesamtleader: ${lead[0]} (+${lead[1].toFixed(2)} CHF) • 📉 Gesamtloser: ${lose[0]} (${lose[1].toFixed(2)} CHF) • 🎲 ${nights.length} Poker Nights`; }
function render(){
playerList.innerHTML=names.map((n,i)=>`<div class="card">${n}<button class="btn del" onclick="delName(${i})">Löschen</button></div>`).join("");
let stat={}; nights.forEach(n=>n.players.forEach(p=>{if(!stat[p.name])stat[p.name]={sum:0,games:0};stat[p.name].sum+=p.diff;stat[p.name].games++;}));
stats.innerHTML=Object.entries(stat).sort((a,b)=>b[1].sum-a[1].sum).map(([n,s])=>`<div class="card"><b>${n}</b><br>${s.sum.toFixed(2)} CHF<br>${s.games} Nächte</div>`).join("");
history.innerHTML=[...nights].reverse().map((n,idx)=>`<div class="card"><b>🃏 ${n.date}</b><br>📍 ${n.ort}<br>🏆 ${n.winner}<details><summary>Details</summary>${n.players.map(p=>`<div class="${p.diff>=0?'win':'lose'}">${p.name}: ${p.diff.toFixed(2)} CHF</div>`).join("")}<br>${n.transfers.join("<br>")}</details><button class="btn del" onclick="delNight(${nights.length-1-idx})">Löschen</button></div>`).join("");
updateTicker();
}
render();
</script>
</body></html>
